<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director's Notebook</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #121212; color: #fff; }
        h1 { text-align: center; color: #f39c12; letter-spacing: 2px;}
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: none; background: #2a2a2a; color: #fff; box-sizing: border-box; font-size: 16px;}
        input:focus, textarea:focus { outline: 2px solid #f39c12; }
        
        /* The Google Doc Editor Styles */
        .editor-wrapper { background: #ffffff; border-radius: 6px; margin-top: 5px; color: #000; }
        #editor-container { height: 250px; font-size: 16px; font-family: 'Georgia', serif;}
        .ql-toolbar { background: #f4f4f4; border-top-left-radius: 6px; border-top-right-radius: 6px; }

        /* Search Bar Styles */
        .search-container { margin-top: 40px; margin-bottom: 20px; position: relative;}
        #search-bar { background: #1e1e1e; border: 1px solid #333; padding-left: 40px;}
        .search-icon { position: absolute; left: 12px; top: 18px; font-size: 18px; }

        /* Buttons */
        .main-btn { background: #f39c12; color: #121212; padding: 12px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 15px; transition: 0.3s;}
        .main-btn:hover { background: #e67e22; }
        
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; margin-left: 5px;}
        .edit-btn { background: #3498db; color: white; }
        .edit-btn:hover { background: #2980b9; }
        .delete-btn { background: #e74c3c; color: white; }
        .delete-btn:hover { background: #c0392b; }
        
        .movie-card { background: #1e1e1e; padding: 20px; margin-bottom: 15px; border-radius: 6px; border-left: 4px solid #f39c12; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .movie-title { font-size: 1.4em; margin: 0 0 10px 0; font-weight: bold; color: #f39c12;}
        .movie-director { font-size: 0.7em; color: #aaa; font-weight: normal;}
        .script-display { background: #121212; padding: 15px; border-radius: 4px; margin-top: 15px; border: 1px solid #333; color: #ddd; font-family: 'Georgia', serif; line-height: 1.6;}
    </style>
</head>
<body>

    <h1>🎬 THE DIRECTOR'S NOTEBOOK</h1>

    <div>
        <div class="form-group">
            <input type="text" id="title" placeholder="Movie Title or Project Name">
        </div>
        <div class="form-group">
            <input type="text" id="director" placeholder="Director / Brand Collab">
        </div>
        
        <div class="form-group">
            <label style="color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Video Script & Formatted Notes:</label>
            <div class="editor-wrapper">
                <div id="editor-container"></div>
            </div>
        </div>

        <button id="save-btn" class="main-btn" onclick="saveEntry()">Save Project to Database</button>
        <button id="cancel-btn" class="main-btn" style="display: none; background: #555; margin-top: 5px;" onclick="cancelEdit()">Cancel Edit</button>
    </div>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-bar" placeholder="Search your scripts by title, director, or keyword..." onkeyup="filterEntries()">
    </div>

    <div id="entries-container"></div>

    <script>
        // 1. INITIALIZE SUPABASE
        const supabaseUrl = 'https://ovdzrydvtqmzwsuestaf.supabase.co';
        const supabaseKey = 'sb_publishable_bgZqcUz1ZzF7yvMweC4Hpw_t_n308Ep';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Global variables to track state
        let allMovies = []; 
        let currentEditId = null;

        // 2. INITIALIZE THE GOOGLE DOC EDITOR
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Start writing your script here... Use the toolbar for bolding, bullet points, and headers.',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        // 3. FETCH DATA
        async function fetchEntries() {
            const container = document.getElementById('entries-container');
            const { data, error } = await supabaseClient.from('Movies').select('*').order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = '<p style="color: red;">Error loading data.</p>';
                return;
            }

            allMovies = data; // Save the data globally so we can edit it later
            container.innerHTML = ''; 

            data.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                let scriptHtml = movie.script ? `<div class="script-display">${movie.script}</div>` : '';

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <p class="movie-title">${movie.title} <br><span class="movie-director">by ${movie.director}</span></p>
                        </div>
                        <div style="display: flex; gap: 5px;">
                            <button class="action-btn edit-btn" onclick="editEntry(${movie.id})">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteEntry(${movie.id})">Delete</button>
                        </div>
                    </div>
                    ${scriptHtml}
                `;
                container.appendChild(card);
            });
        }

        // 4. SAVE DATA (Handles both NEW and UPDATING entries)
        async function saveEntry() {
            const title = document.getElementById('title').value;
            const director = document.getElementById('director').value;
            const scriptContent = quill.root.innerHTML;

            if (!title || quill.getText().trim().length === 0) {
                alert("Please add a title and write something in the script!");
                return;
            }

            if (currentEditId) {
                // UPDATE EXISTING MOVIE
                const { error } = await supabaseClient.from('Movies').update({ 
                    title: title, 
                    director: director, 
                    script: scriptContent 
                }).eq('id', currentEditId);

                if (error) alert("Error updating: " + error.message);
            } else {
                // CREATE NEW MOVIE
                const { error } = await supabaseClient.from('Movies').insert([
                    { title: title, director: director, notes: "Moved to script", script: scriptContent }
                ]);

                if (error) alert("Error saving: " + error.message);
            }

            // Clear the form and refresh
            cancelEdit();
            fetchEntries();
        }

        // 5. DELETE DATA
        async function deleteEntry(id) {
            // Ask for confirmation so you don't accidentally delete a masterpiece
            if (!confirm("Are you sure you want to delete this project permanently?")) return;

            const { error } = await supabaseClient.from('Movies').delete().eq('id', id);
            
            if (error) {
                alert("Error deleting: " + error.message);
            } else {
                fetchEntries(); // Refresh the list
            }
        }

        // 6. SETUP EDIT MODE
        function editEntry(id) {
            // Find the specific movie in our global array
            const movie = allMovies.find(m => m.id === id);
            if (!movie) return;

            // Fill the form with the saved data
            document.getElementById('title').value = movie.title;
            document.getElementById('director').value = movie.director || '';
            quill.root.innerHTML = movie.script || '';

            // Update our state to "Edit Mode"
            currentEditId = id;
            document.getElementById('save-btn').innerText = "Update Existing Project";
            document.getElementById('save-btn').style.background = "#3498db"; // Turn button blue
            document.getElementById('cancel-btn').style.display = "block"; // Show cancel button

            // Smooth scroll back to the top of the page so you can edit
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 7. CANCEL EDIT MODE
        function cancelEdit() {
            currentEditId = null;
            document.getElementById('title').value = '';
            document.getElementById('director').value = '';
            quill.root.innerHTML = ''; 

            document.getElementById('save-btn').innerText = "Save Project to Database";
            document.getElementById('save-btn').style.background = "#f39c12"; // Back to orange
            document.getElementById('cancel-btn').style.display = "none";
        }

        // 8. LIVE SEARCH FILTER
        function filterEntries() {
            const searchQuery = document.getElementById('search-bar').value.toLowerCase();
            const cards = document.getElementsByClassName('movie-card');

            for (let i = 0; i < cards.length; i++) {
                const cardText = cards[i].innerText.toLowerCase();
                if (cardText.includes(searchQuery)) {
                    cards[i].style.display = "block";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // Load the entries when the page starts
        fetchEntries();
    </script>
</body>
</html>
